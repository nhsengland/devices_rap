[build-system]
requires = ["flit_core >=3.2,<4"]
build-backend = "flit_core.buildapi"

[project]
name = "devices_rap"
version = "0.0.1"
description = "A short description of the project."
authors = [
  { name = "Joseph Wilson" },
  { name = "NHS England - Direct Commissioning" },
]
license = { file = "LICENSE" }
readme = "README.md"
classifiers = [
    "Development Status :: 3 - Alpha",
    # "Development Status :: 4 - Beta",
    # "Development Status :: 5 - Production/Stable",
    "Programming Language :: Python :: 3",
    "License :: OSI Approved :: MIT License"
]
requires-python = ">=3.10"

[tool.black]
line-length = 99
include = '\.pyi?$'
exclude = '''
/(
    \.git
  | \.venv
)/
'''

[tool.ruff.lint.isort]
known_first_party = ["devices_rap"]
force_sort_within_sections = true

[tool.pytest.ini_options]
markers = [
    "slow: marks tests as slow (deselect with '-m \"not slow\"')",
    "no_data_needed: marks tests that do not require datafiles (deselect with '-m \"not no_data_needed\"')",
    "data_needed: marks tests that do require datafiles (deselect with '-m \"not data_needed\"')",
]

[tool.coverage.run]
omit = [
    "*/tests/*",
    "*/__init__.py",
    "*/_version.py",
]
